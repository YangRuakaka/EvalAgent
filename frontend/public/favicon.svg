<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3730A3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Head -->
  <rect x="60" y="20" width="80" height="70" rx="8" ry="8" fill="url(#headGradient)" stroke="#312E81" stroke-width="2"/>
  
  <!-- Antenna Left -->
  <line x1="75" y1="20" x2="65" y2="5" stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>
  <circle cx="65" cy="5" r="4" fill="#4F46E5"/>
  
  <!-- Antenna Right -->
  <line x1="125" y1="20" x2="135" y2="5" stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>
  <circle cx="135" cy="5" r="4" fill="#4F46E5"/>
  
  <!-- Left Eye -->
  <rect x="75" y="35" width="16" height="22" rx="3" ry="3" fill="#1F2937"/>
  <circle cx="83" cy="46" r="6" fill="#10B981" opacity="0.9"/>
  <circle cx="85" cy="44" r="3" fill="#D1FAE5"/>
  
  <!-- Right Eye -->
  <rect x="109" y="35" width="16" height="22" rx="3" ry="3" fill="#1F2937"/>
  <circle cx="117" cy="46" r="6" fill="#10B981" opacity="0.9"/>
  <circle cx="119" cy="44" r="3" fill="#D1FAE5"/>
  
  <!-- Mouth -->
  <path d="M 85 62 Q 100 70 115 62" stroke="#1F2937" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Body -->
  <rect x="45" y="90" width="110" height="80" rx="6" ry="6" fill="url(#bodyGradient)" stroke="#312E81" stroke-width="2"/>
  
  <!-- Chest Panel -->
  <rect x="55" y="100" width="90" height="50" rx="4" ry="4" fill="#1F2937" opacity="0.3"/>
  
  <!-- Circuit Pattern -->
  <circle cx="70" cy="115" r="4" fill="#10B981"/>
  <circle cx="100" cy="115" r="4" fill="#10B981"/>
  <circle cx="130" cy="115" r="4" fill="#10B981"/>
  <line x1="70" y1="115" x2="100" y2="115" stroke="#10B981" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="115" x2="130" y2="115" stroke="#10B981" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Lower Panel -->
  <circle cx="70" cy="140" r="4" fill="#10B981"/>
  <circle cx="100" cy="140" r="4" fill="#10B981"/>
  <circle cx="130" cy="140" r="4" fill="#10B981"/>
  <line x1="70" y1="140" x2="100" y2="140" stroke="#10B981" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="140" x2="130" y2="140" stroke="#10B981" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Left Arm -->
  <rect x="20" y="105" width="25" height="20" rx="4" ry="4" fill="url(#bodyGradient)" stroke="#312E81" stroke-width="2"/>
  <circle cx="20" cy="115" r="6" fill="#1F2937"/>
  
  <!-- Right Arm -->
  <rect x="155" y="105" width="25" height="20" rx="4" ry="4" fill="url(#bodyGradient)" stroke="#312E81" stroke-width="2"/>
  <circle cx="180" cy="115" r="6" fill="#1F2937"/>
  
  <!-- Left Leg -->
  <rect x="65" y="170" width="15" height="20" rx="3" ry="3" fill="url(#bodyGradient)" stroke="#312E81" stroke-width="2"/>
  <rect x="62" y="188" width="21" height="8" rx="2" ry="2" fill="#1F2937"/>
  
  <!-- Right Leg -->
  <rect x="120" y="170" width="15" height="20" rx="3" ry="3" fill="url(#bodyGradient)" stroke="#312E81" stroke-width="2"/>
  <rect x="117" y="188" width="21" height="8" rx="2" ry="2" fill="#1F2937"/>
</svg>